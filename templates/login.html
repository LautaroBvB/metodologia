{% extends 'base.html' %}
{% load static %}

{% block content %}

<div id="wrapper">
    <div id="main">
        <div class="inner">

            <section>
                <header class="main">
                    <h1 style="text-align: center;">Iniciar sesión</h1>
                </header>

                <form method="post">
                    {% csrf_token %}
                    <div class="row gtr-uniform">

                        <div class="col-12">
                            <input type="email" name="email" placeholder="Email">
                        </div>

                        <div class="col-12">
                            <input type="password" name="password" placeholder="Contraseña">
                        </div>

                        <div class="col-12">
                            <ul class="actions special">
                                <li>
                                    <input type="submit" value="Iniciar sesión" class="primary">
                                </li>
                            </ul>
                        </div>

                    </div>
                </form>
                <footer> <h4 style="text-align: center;">No tienes una cuenta? <a href="{% url 'register' %}">Regístrate aquí!</a></h5></footer>

            </section>

        </div>
    </div>
</div>

{% endblock %}
